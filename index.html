<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヤフオク仕入れ計算ツール</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
</head>
<body>

<h1>ヤフオク仕入れ計算ツール</h1>

<div class="box">

    <div id="items">

        <div class="item-row">
            <input type="number" class="item-price" placeholder="上限額">
            <input type="number" class="item-qty" placeholder="個数">
            <button onclick="removeItem(this)">削除</button>
        </div>

    </div>

    <button class="add-btn" onclick="addItem()">＋ 行を追加</button>

    <label>送料</label>
    <input type="number" id="shipping" placeholder="送料">

    <button class="calc-btn" onclick="calc()">計算する</button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
